<style>
/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #1c1c1c, #000);
    color: white;
    line-height: 1.6;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px;
    background: rgba(0,0,0,0.8);
}

header h1 {
    font-size: 3rem;
}

/* CONTACT SECTION */
.contact-section {
    padding: 60px 20px;
    max-width: 900px;
    margin: 0 auto;
}

.contact-section h2 {
    text-align: center;
    font-size: 2.5rem;
    margin-bottom: 20px;
    color: turquoise;
}

.contact-section p {
    text-align: center;
    margin-bottom: 40px;
    color: #aaa;
}

/* FORM STYLING */
.contact-form {
    display: flex;
    flex-direction: column;
    gap: 15px;
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 10px;
}

.contact-form input, 
.contact-form textarea {
    padding: 12px;
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    background: rgba(255,255,255,0.1);
    color: white;
    resize: none;
    transition: 0.3s;
}

.contact-form input:focus,
.contact-form textarea:focus {
    outline: none;
    background: rgba(0,255,255,0.1);
}

.contact-form button {
    padding: 12px;
    font-size: 1.1rem;
    background: turquoise;
    color: black;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: transform 0.3s, background 0.3s;
}

.contact-form button:hover {
    transform: scale(1.05);
    background: #00b3b3;
}

/* CONTACT INFO */
.contact-info {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-around;
    margin-top: 50px;
    gap: 20px;
}

.info-card {
    flex: 1 1 250px;
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    transition: transform 0.3s, background 0.3s;
}

.info-card:hover {
    transform: translateY(-5px);
    background: turquoise;
    color: black;
}

.info-card h3 {
    margin-bottom: 10px;
    color: turquoise;
    display: flex;
}

.info-card a {
    color: inherit;
    text-decoration: none;
    transition: 0.3s;
}

.info-card a:hover {
    color: black;
    font-weight: bold;
}
.fly:hover{
background: linear-gradient(to right,black,turquoise);
color: turquoise;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .contact-info {
        flex-direction: column;
        align-items: center;
    }
}
</style>
</section>

<script>
// FORM VALIDATION
const form = document.getElementById('contactForm');
form.addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const message = document.getElementById('message').value.trim();

    if(name === "" || email === "" || message === "") {
        alert("Please fill in all fields.");
    } else {
        alert("Message sent! Thank you for reaching out.");
        form.reset();
    }
});
</script>
